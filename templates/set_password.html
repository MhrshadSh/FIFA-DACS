{% extends "base.html" %}

{% block title %}Set Password | FIFA League Tracker{% endblock %}

{% block content %}
  <section class="form-layout">
    <div class="form-copy">
      <p class="eyebrow">Authentication</p>
      <h1>Set edit password</h1>
      <p>This legacy league needs a password before results, roster changes, or deletes can be edited.</p>
    </div>

    <form class="panel" method="post">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label>
        New edit password
        <input name="password" type="password" minlength="4" autofocus>
      </label>
      <button class="button primary" type="submit">Save password</button>
    </form>
  </section>
{% endblock %}
