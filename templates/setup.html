{% extends "base.html" %}

{% block title %}Setup | FIFA League Tracker{% endblock %}

{% block content %}
  <section class="form-layout">
    <div class="form-copy">
      <p class="eyebrow">Setup</p>
      <h1>Build a new league</h1>
      <p>Choose a 1v1 league or a 2v2 team league. Creating a league generates one fixture for every player or team pairing.</p>
    </div>

    <form class="panel" method="post">
      <label>
        League name
        <input name="league_name" type="text" placeholder="Friday Night FIFA">
      </label>

      <label>
        League type
        <select name="league_type">
          <option value="1v1">1v1 players</option>
          <option value="2v2">2v2 teams</option>
        </select>
      </label>

      <label>
        Edit password
        <input name="password" type="password" minlength="4" placeholder="Used for results, roster changes, and deletes">
      </label>

      <label>
        Players or teams
        <textarea name="participants" rows="9" placeholder="1v1:&#10;Alex&#10;Sam&#10;Jordan&#10;&#10;2v2:&#10;Alex / Sam&#10;Jordan / Taylor"></textarea>
      </label>

      <button class="button primary" type="submit">Create fixtures</button>
    </form>
  </section>
{% endblock %}
